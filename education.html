<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>學歷 - 勝翔</title>

<style>
/* --- 基礎設定 --- */
body {
    margin: 0;
    font-family: "Microsoft JhengHei", Arial, sans-serif;
    background: #0e1117;
    color: white;
    display: flex;
    flex-direction: column; /* 手機版：垂直堆疊 */
}

/* --- 導覽列 RWD --- */
.sidebar {
    width: 100%;
    background: #111827;
    padding: 15px;
    box-sizing: border-box;
    border-bottom: 1px solid #1f2937;
}

.nav-links {
    display: flex; /* 手機版：橫向排列 */
    justify-content: center;
    flex-wrap: wrap; 
    gap: 8px;
}

.sidebar a {
    color: white;
    padding: 8px 12px;
    text-decoration: none;
    border-radius: 6px;
    background: #1f2937;
    font-size: 14px;
    transition: 0.3s;
}

.sidebar a:hover {
    background: #374151;
}

/* --- 主內容 --- */
.content {
    padding: 20px;
    box-sizing: border-box;
}

/* --- 桌機版佈局 (螢幕寬度 > 768px) --- */
@media (min-width: 768px) {
    body {
        flex-direction: row; /* 桌機：左右排列 */
    }

    .sidebar {
        width: 220px;
        height: 100vh;
        position: fixed;
        padding: 40px 20px;
        border-bottom: none;
        border-right: 1px solid #1f2937;
    }

    .nav-links {
        display: block; /* 桌機：恢復垂直排列 */
    }

    .sidebar a {
        display: block;
        margin: 10px 0;
        background: transparent;
        font-size: 16px;
    }

    .content {
        margin-left: 240px; 
        padding: 40px;
        max-width: 900px;
    }
}

/* --- 元件樣式 --- */
.card { 
    background: #161b22; 
    padding: 20px; 
    border-radius: 10px; 
    margin-bottom: 20px; 
    border: 1px solid #30363d; 
}
.school-name { 
    color: #58a6ff; 
    font-size: 1.2rem; 
    margin: 0 0 10px 0; 
}
.date-text { 
    color: #8b949e; 
    font-size: 0.95rem; 
    margin: 0; 
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="nav-links">
        <a href="index.html">個人介紹</a>
        <a href="education.html">學歷</a>
        <a href="experience.html">經歷</a>
        <a href="skills.html">技能</a>
    </div>
</div>

<div class="content">
    <h1>學歷</h1>

    <div class="card">
        <h3 class="school-name">正修科技大學｜電機工程系（二技）</h3>
        <p class="date-text">2002 / 09 ～ 2004 / 06</p>
    </div>

    <div class="card">
        <h3 class="school-name">高苑技術學院｜電機工程系（二專）</h3>
        <p class="date-text">2000 / 09 ～ 2002 / 06</p>
    </div>

    <div class="card">
        <h3 class="school-name">民雄農工｜電工科</h3>
        <p class="date-text">1997 / 09 ～ 2000 / 06</p>
    </div>
</div>

</body>
</html>
