<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人介紹 - 勝翔</title>

<style>
/* --- 基礎設定 --- */
body {
    margin: 0;
    font-family: "Microsoft JhengHei", Arial, sans-serif;
    background: #0e1117;
    color: white;
    display: flex;
    flex-direction: column; /* 手機版：垂直堆疊（導覽在上、內容在下） */
}

/* --- 導覽列 RWD --- */
.sidebar {
    width: 100%; /* 手機版：寬度 100% */
    background: #111827;
    padding: 15px;
    box-sizing: border-box;
    position: relative;
    border-bottom: 1px solid #1f2937;
}

.sidebar h3 {
    margin: 0 0 10px 0;
    text-align: center;
    font-size: 1.2rem;
}

.nav-links {
    display: flex; /* 手機版：橫向排隊 */
    justify-content: center;
    flex-wrap: wrap; /* 連結太多時自動換行 */
    gap: 8px;
}

.sidebar a {
    color: white;
    padding: 8px 12px;
    text-decoration: none;
    border-radius: 6px;
    background: #1f2937;
    font-size: 14px;
    transition: 0.3s;
}

.sidebar a:hover {
    background: #374151;
}

/* --- 主內容 RWD --- */
.content {
    padding: 20px;
    max-width: 100%;
    box-sizing: border-box;
}

.profile {
    width: 120px; /* 手機版圖片縮小 */
    border-radius: 12px;
    display: block;
    margin: 0 auto; /* 手機版置中 */
}

.info-table {
    width: 100%;
}

/* --- 桌機版佈局：寬度大於 768px 時觸發 --- */
@media (min-width: 768px) {
    body {
        flex-direction: row; /* 桌機版：改為左右排列 */
    }

    .sidebar {
        width: 220px;
        height: 100vh;
        position: fixed; /* 固定在左側 */
        padding: 40px 20px;
        border-bottom: none;
        border-right: 1px solid #1f2937;
    }

    .sidebar h3 {
        text-align: left;
        margin-bottom: 20px;
    }

    .nav-links {
        display: block; /* 桌機版：連結恢復垂直排列 */
    }

    .sidebar a {
        display: block;
        margin: 10px 0;
        background: transparent;
        font-size: 16px;
    }

    .sidebar a:hover {
        background: #1f2937;
    }

    .content {
        margin-left: 240px; /* 留出左側導覽的寬度 */
        padding: 40px;
        max-width: 900px;
    }

    .profile {
        width: 200px; /* 桌機版圖片恢復大圖 */
        margin: 0;
    }

    .header-flex {
        display: flex;
        align-items: center;
    }
}

/* --- 通用元件樣式 --- */
hr { border: 0; border-top: 1px solid #333; margin: 25px 0; }
.tag { display: inline-block; background: #1f2937; padding: 6px 10px; margin: 4px; border-radius: 6px; font-size: 13px; }
.card { background: #161b22; padding: 15px; border-radius: 10px; margin-top: 10px; border: 1px solid #30363d; }
a { color: #58a6ff; text-decoration: none; }
a:hover { text-decoration: underline; }
ul { padding-left: 20px; }
li { margin-bottom: 8px; }
</style>
</head>

<body>

<div class="sidebar">
    <h3>導覽</h3>
    <div class="nav-links">
        <a href="index.html">個人介紹</a>
        <a href="education.html">學歷</a>
        <a href="experience.html">經歷</a>
        <a href="skills.html">技能</a>
    </div>
</div>

<div class="content">

    <div class="header-flex">
        <img src="assets/p1.jpg" class="profile" alt="個人照">
        <div style="padding: 20px 0 0 20px;">
            <h1 style="margin:0;">勝翔</h1>
            <p style="color:#8b949e; font-size: 1.2rem;">資料分析 / 資料工程</p>
        </div>
    </div>
