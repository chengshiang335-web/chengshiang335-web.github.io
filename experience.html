<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>經歷 - 勝翔</title>

<style>
/* --- 基礎設定 --- */
body {
    margin: 0;
    font-family: "Microsoft JhengHei", Arial, sans-serif;
    background: #0e1117;
    color: white;
    display: flex;
    flex-direction: column; /* 手機版：預設垂直堆疊 */
}

/* --- 導覽列 RWD --- */
.sidebar {
    width: 100%;
    background: #111827;
    padding: 15px;
    box-sizing: border-box;
    border-bottom: 1px solid #1f2937;
}

/* 關鍵：手機版連結橫向排列的容器 */
.nav-links {
    display: flex; 
    justify-content: center;
    flex-wrap: wrap; 
    gap: 8px;
}

.sidebar a {
    color: white;
    padding: 8px 12px;
    text-decoration: none;
    border-radius: 6px;
    background: #1f2937;
    font-size: 14px;
    transition: 0.3s;
}

.sidebar a:hover {
    background: #374151;
}

/* --- 主內容 --- */
.content {
    padding: 20px;
    box-sizing: border-box;
}

/* --- 桌機版佈局 (螢幕寬度 > 768px) --- */
@media (min-width: 768px) {
    body {
        flex-direction: row; /* 桌機：左右排列 */
    }

    .sidebar {
        width: 220px;
        height: 100vh;
        position: fixed;
        padding: 40px 20px;
        border-bottom: none;
        border-right: 1px solid #1f2937;
    }

    .nav-links {
        display: block; /* 桌機：恢復垂直排列 */
    }

    .sidebar a {
        display: block;
        margin: 10px 0;
        background: transparent;
        font-size: 16px;
    }

    .content {
        margin-left: 240px; /* 留出左側導覽空間 */
        padding: 40px;
        max-width: 900px;
    }
}

/* --- 元件樣式 --- */
.card { 
    background: #161b22; 
    padding: 20px; 
    border-radius: 10px; 
    margin-top: 15px; 
    border: 1px solid #30363d; 
    line-height: 1.6;
}
b { color: #58a6ff; font-size: 1.1rem; }
</style>
</head>

<body>

<div class="sidebar">
    <div class="nav-links">
        <a href="index.html">個人介紹</a>
        <a href="education.html">學歷</a>
        <a href="experience.html">經歷</a>
        <a href="skills.html">技能</a>
    </div>
</div>

<div class="content">
    <h1>經歷</h1>

    <div class="card">
        <b>凌發科技｜Unity 組長</b><br>
        博彩平台 / 團隊管理<br>
        <span style="color: #8b949e; font-size: 0.9rem;">負責 Client 端架構設計與開發進度控管。</span>
    </div>

    <div class="card">
        <b>網銀國際｜資深工程師</b><br>
        Unity 手遊 / Client 主程<br>
        <span style="color: #8b949e; font-size: 0.9rem;">主導手機遊戲功能模組開發與效能優化。</span>
    </div>
</div>

</body>
</html>
